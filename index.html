<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harmony - Offline Music Player</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="ambient-grid" aria-hidden="true"></div>

    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <a class="brand" href="#" aria-label="Harmony home">
          <span class="brand-mark">
            <img src="assets/icons/music.svg" alt="" />
          </span>
          <span>Harmony</span>
        </a>

        <nav class="nav-list">
          <button class="nav-item is-active" type="button" data-view="home">
            <img src="assets/icons/home.svg" alt="" />
            <span>Home</span>
          </button>
          <button class="nav-item" type="button" data-view="library">
            <img src="assets/icons/library.svg" alt="" />
            <span>Library</span>
            <span class="nav-count" id="likedCount">0</span>
          </button>
        </nav>

        <div class="sidebar-panel">
          <p class="panel-kicker">Offline</p>
          <p class="panel-title">30-track collection</p>
          <div class="mini-eq" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="viewEyebrow">Home</p>
            <h1 id="viewTitle">Today's Mix</h1>
          </div>

          <label class="search-box" for="searchInput">
            <img src="assets/icons/search.svg" alt="" />
            <input id="searchInput" type="search" placeholder="Search songs" autocomplete="off" />
            <button class="clear-search" id="clearSearch" type="button" aria-label="Clear search">
              <img src="assets/icons/close.svg" alt="" />
            </button>
          </label>
        </header>

        <section class="hero-panel" aria-labelledby="heroTitle">
          <div class="hero-copy">
            <p class="eyebrow" id="heroEyebrow">Now Playing</p>
            <h2 id="heroTitle">Nocturne City</h2>
            <p id="heroArtist">Ari Voss</p>
            <div class="hero-actions">
              <button class="hero-play" id="heroPlay" type="button">
                <img src="assets/icons/play.svg" alt="" id="heroPlayIcon" />
                <span id="heroPlayText">Play</span>
              </button>
              <button class="icon-button glass-button" id="heroFavorite" type="button" aria-label="Like song">
                <img src="assets/icons/heart.svg" alt="" />
              </button>
            </div>
          </div>

          <div class="hero-visual">
            <img id="heroCover" src="assets/covers/cover1.jpg" alt="Album cover" />
            <div class="hero-rings" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </section>

        <section class="tracks-section" aria-labelledby="tracksHeading">
          <div class="section-heading">
            <div>
              <p class="eyebrow" id="trackContext">All Tracks</p>
              <h2 id="tracksHeading">Featured Songs</h2>
            </div>
            <span id="resultCount">30 songs</span>
          </div>

          <div class="track-grid" id="trackGrid" aria-live="polite"></div>
          <div class="empty-state" id="emptyState" hidden>
            <img src="assets/icons/search.svg" alt="" />
            <h3>No songs found</h3>
            <p>Try another title.</p>
          </div>
        </section>
      </main>
    </div>

    <footer class="player" aria-label="Music player">
      <div class="player-song">
        <img class="player-cover" id="playerCover" src="assets/covers/cover1.jpg" alt="Album cover" />
        <div class="player-meta">
          <p id="playerTitle">Nocturne City</p>
          <span id="playerArtist">Ari Voss</span>
        </div>
        <button class="icon-button like-button" id="playerFavorite" type="button" aria-label="Like song">
          <img src="assets/icons/heart.svg" alt="" />
        </button>
      </div>

      <div class="player-center">
        <div class="control-row">
          <button class="icon-button" id="prevBtn" type="button" aria-label="Previous song">
            <img src="assets/icons/prev.svg" alt="" />
          </button>
          <button class="icon-button primary-control" id="playPauseBtn" type="button" aria-label="Play">
            <img id="playPauseIcon" src="assets/icons/play.svg" alt="" />
          </button>
          <button class="icon-button" id="nextBtn" type="button" aria-label="Next song">
            <img src="assets/icons/next.svg" alt="" />
          </button>
        </div>

        <div class="timeline">
          <span id="currentTime">0:00</span>
          <input class="range progress-range" id="progressRange" type="range" min="0" max="1000" value="0" aria-label="Seek" />
          <span id="durationTime">0:00</span>
        </div>
      </div>

      <div class="player-volume">
        <button class="icon-button" id="muteBtn" type="button" aria-label="Mute">
          <img id="volumeIcon" src="assets/icons/volume.svg" alt="" />
        </button>
        <input class="range volume-range" id="volumeRange" type="range" min="0" max="1" step="0.01" value="0.72" aria-label="Volume" />
      </div>
    </footer>

    <audio id="audio" preload="metadata"></audio>
    <script src="data/songs.js" defer></script>
    <script src="script.js" defer></script>
  </body>
</html>
