<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">Harmony default album cover</title>
  <desc id="desc">A premium abstract album cover used when track artwork is missing.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="76" x2="656" y2="644" gradientUnits="userSpaceOnUse">
      <stop stop-color="#113f36"/>
      <stop offset=".5" stop-color="#1cae88"/>
      <stop offset="1" stop-color="#ffb15c"/>
    </linearGradient>
    <radialGradient id="soft" cx="50%" cy="50%" r="52%">
      <stop stop-color="#ffffff" stop-opacity=".34"/>
      <stop offset=".65" stop-color="#ffffff" stop-opacity=".1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#03110e" flood-opacity=".42"/>
    </filter>
  </defs>
  <rect width="720" height="720" rx="72" fill="#080908"/>
  <rect x="24" y="24" width="672" height="672" rx="56" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="270" cy="310" r="224" fill="#f6f3ec" opacity=".18"/>
  <circle cx="474" cy="412" r="196" fill="#ffffff" opacity=".12"/>
  <circle cx="360" cy="360" r="218" fill="none" stroke="#f6f3ec" stroke-opacity=".22" stroke-width="3"/>
  <circle cx="360" cy="360" r="170" fill="none" stroke="#f6f3ec" stroke-opacity=".24" stroke-width="3"/>
  <circle cx="360" cy="360" r="124" fill="none" stroke="#f6f3ec" stroke-opacity=".25" stroke-width="3"/>
  <circle cx="360" cy="360" r="78" fill="url(#soft)" stroke="#f6f3ec" stroke-opacity=".25" stroke-width="3"/>
  <path d="M328 432a37 37 0 1 1-27-35.5V263l132-28v157a37 37 0 1 1-27-35.5v-75.7l-78 16.6V432Z" fill="#f6f3ec"/>
  <text x="360" y="612" text-anchor="middle" fill="#f6f3ec" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="800" letter-spacing="4">HARMONY</text>
</svg>
